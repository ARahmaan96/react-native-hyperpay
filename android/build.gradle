buildscript {
    if (project == rootProject) {
        repositories {
            google()
            mavenCentral()
        }

        dependencies {
            classpath 'com.android.tools.build:gradle:8.8.2'
        }
    }
}

apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    compileSdk safeExtGet('HyperPay_compileSdkVersion', 35)
    namespace "com.reactnativehyperpay"

    buildFeatures {
        viewBinding true
    }

    defaultConfig {
        minSdkVersion safeExtGet('HyperPay_minSdkVersion', 24)
        targetSdkVersion safeExtGet('HyperPay_targetSdkVersion', 35)
        versionCode 2
        versionName "2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    lintOptions {
        disable 'GradleCompatible'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    mavenLocal()
    maven {
        url("$rootDir/../node_modules/react-native/android")
    }
    google()
    mavenCentral()
}

dependencies {
    implementation files('libs/oppwa.mobile-7.11.0-release.aar')
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "androidx.lifecycle:lifecycle-extensions:2.2.0"
    implementation "androidx.browser:browser:1.8.0"
    implementation "androidx.fragment:fragment:1.8.6"
    implementation "androidx.recyclerview:recyclerview:1.4.0"
    implementation "androidx.webkit:webkit:1.12.1"
    implementation "com.google.android.material:material:1.12.0"
    implementation "com.google.code.gson:gson:2.10.1"
    //noinspection GradleDynamicVersion
    implementation "com.facebook.react:react-native:+"
}